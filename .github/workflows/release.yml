name: Release (disabled in fork)

# Upstream's semantic-release flow: auto-computes a semver from conventional
# commits on every push to main and publishes to npm (@tawandotorg) + GitHub
# Packages. That is wrong for this fork:
#   - it ignores the manual `vX.Y.Z-fork.N` tag scheme,
#   - it would publish to the upstream npm scope.
#
# Disabled here. The fork cuts releases manually via `build-release.yml`
# (workflow_dispatch) — or a local cross-compile + `gh release create` — and
# mise installs the prebuilt binary from the GitHub Release. There is no
# auto-trigger; even a manual dispatch is a no-op.

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "release.yml is disabled in this fork."
          echo "Cut a release with build-release.yml (workflow_dispatch) instead."
